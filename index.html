<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>Cocos Creator | mall-queen-cocos</title>

  <!--http://www.html5rocks.com/en/mobile/mobifying/-->
  <meta name="viewport"
        content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true"/>

  <!--https://developer.apple.com/library/safari/documentation/AppleApplications/Reference/SafariHTMLRef/Articles/MetaTags.html-->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">

  <!-- force webkit on 360 -->
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <!-- force edge on IE -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="msapplication-tap-highlight" content="no">

  <!-- force full screen on some browser -->
  <meta name="full-screen" content="yes"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>

  <!--fix fireball/issues/3568 -->
  <!--<meta name="browsermode" content="application">-->
  <meta name="x5-page-mode" content="app">

  <!--<link rel="apple-touch-icon" href=".png" />-->
  <!--<link rel="apple-touch-icon-precomposed" href=".png" />-->

  <link rel="stylesheet" type="text/css" href="style.02f4a.css"/>

  <style>
    #rotate-tip { display: none; }
    @media screen and (orientation: portrait) {
      #GameDiv { visibility: hidden; }
      #rotate-tip {
        display: flex; position: fixed; inset: 0; z-index: 99999;
        flex-direction: column; align-items: center; justify-content: center;
        background: #f7ede0; color: #c8643c; padding: 24px; box-sizing: border-box;
        font-family: Helvetica, Arial, "PingFang SC", sans-serif; text-align: center;
      }
      #rotate-tip .icon { font-size: 60px; margin-bottom: 18px; animation: rothint 1.8s ease-in-out infinite; }
      #rotate-tip .txt { font-size: 19px; font-weight: 700; line-height: 1.7; }
      @keyframes rothint { 0%,55%{ transform: rotate(0); } 80%,100%{ transform: rotate(90deg); } }
    }
  </style>
</head>
<body>
  <div id="rotate-tip">
    <div class="icon">📱</div>
    <div class="txt">请将手机横屏<br>以获得最佳游玩体验</div>
  </div>
  <div id="GameDiv" cc_exact_fit_screen="true">
      <div id="Cocos3dGameContainer">
        <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99"></canvas>
      </div>
    </div>
  

<!-- Polyfills bundle. -->

<script src="src/polyfills.bundle.5adbf.js" charset="utf-8"> </script>


<!-- SystemJS support. -->
<script src="src/system.bundle.543e6.js" charset="utf-8"> </script>

<!-- Import map -->
<script src="src/import-map.4e643.json" type="systemjs-importmap" charset="utf-8"> </script>

<script>
    System.import('./index.594cb.js').catch(function(err) { console.error(err); })
</script>

</body>
</html>
